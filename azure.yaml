# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: apim-lb-content-safety
metadata:
  template: apim-lb-content-safety@1.0.0

infra:
  provider: bicep
  path: infra
  module: main

services:
  api:
    project: ./src/api
    language: python
    host: function

hooks:
  postprovision:
    windows:
      shell: pwsh
      run: ./scripts/postprovision.ps1
      continueOnError: false
      interactive: false
    posix:
      shell: pwsh
      run: ./scripts/postprovision.ps1
      continueOnError: false
      interactive: false
