name: test

on:
  # Always run on PRs to main so this check can be required by branch
  # protection without blocking unrelated PRs (path-filtered required checks
  # never report status when skipped, so PRs hang waiting for them).
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'src/api/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Function App — pytest + ruff + bandit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/api

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: src/api/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Bandit
        run: bandit -c pyproject.toml -r function_app.py

      - name: Pytest with coverage
        run: pytest --cov=function_app --cov-report=term-missing --cov-fail-under=80
