name: test

on:
  # Always run on PRs to main so this check can be required by branch
  # protection without blocking unrelated PRs (path-filtered required checks
  # never report status when skipped, so PRs hang waiting for them).
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'src/api/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Function App — pytest + ruff + bandit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/api

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: src/api/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Bandit
        # Scan the whole api package; pyproject.toml excludes tests/.venv/build.
        run: bandit -c pyproject.toml -r .

      - name: pip-audit (runtime dependencies)
        # CodeQL covers our source code; this catches CVEs in the transitive
        # dependency graph of requirements.txt that CodeQL does not see.
        # Scoped to runtime deps only — dev-only deps (pytest, ruff, bandit)
        # are not shipped to Azure and would create noise.
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --disable-pip --strict

      - name: Pytest with coverage
        run: pytest --cov=function_app --cov-report=term-missing --cov-fail-under=80
