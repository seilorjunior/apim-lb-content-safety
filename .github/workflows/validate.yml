name: validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bicep:
    name: Bicep build + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Bicep
        run: az bicep install

      - name: Build infra/main.bicep
        run: |
          az bicep build --file infra/main.bicep --stdout > /dev/null
          echo "infra/main.bicep compiles cleanly"

      - name: Lint Bicep
        run: az bicep lint --file infra/main.bicep

  policy-xml:
    name: APIM policy XML well-formedness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libxml2-utils

      # NOTE: APIM policies use a lenient XML grammar — C# expressions in
      # attribute values (e.g. value="@(ctx.Var["foo"])") are accepted by the
      # APIM policy parser but are not strict-XML well-formed. So we use
      # `xmllint --recover` which tolerates these expression-string quirks
      # and only fails on genuine structural breakage (missing close tag,
      # unbalanced elements, illegal entities, etc.).
      - name: Structural validation of every policy XML
        run: |
          set -euo pipefail
          fail=0
          for f in infra/modules/policies/*.xml; do
            echo "== $f =="
            # --recover: tolerate well-formedness violations from APIM expressions.
            # We only treat unrecoverable structural failures as errors.
            if ! xmllint --noout --recover "$f" 2> /tmp/xmllint.err; then
              echo "::error file=$f::Unrecoverable XML structural error"
              cat /tmp/xmllint.err
              fail=1
            fi
            # Sanity: file must contain the four standard policy sections.
            for section in '<policies' '<inbound>' '<backend>' '<outbound>' '<on-error>' '</policies>'; do
              if ! grep -q "$section" "$f"; then
                echo "::error file=$f::Missing required section: $section"
                fail=1
              fi
            done
          done
          if [ $fail -ne 0 ]; then
            echo "::error::One or more policy XML files failed structural validation"
            exit 1
          fi

  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: DavidAnson/markdownlint-cli2-action@db43aef879112c3119a410d69f66701e0d530809  # v17
        with:
          globs: '**/*.md'
